name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SharpMemory.slnx

      - name: Build
        run: dotnet build SharpMemory.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/SharpMemory.Tests/SharpMemory.Tests.csproj --no-build --configuration Release

      - name: Tool smoke test
        shell: pwsh
        run: ./eng/smoke-tool.ps1 -Configuration Release
