name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SharpMemory.slnx

      - name: Build
        run: dotnet build SharpMemory.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test src/SharpMemory.Tests/SharpMemory.Tests.csproj --no-build --configuration Release

      - name: Pack
        run: dotnet pack src/SharpMemory.Tool/SharpMemory.Tool.csproj --no-build --configuration Release --output .artifacts/packages

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: shiyoi

      - name: Publish
        run: dotnet nuget push .artifacts/packages/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json
